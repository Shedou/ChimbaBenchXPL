[application]

name="ChimbaBenchXPL"
main_scene="res://Main.tscn"
use_shared_user_dir=false
boot_splash_fullsize=true
boot_splash="res://splash.png"
icon="res://icon.png"

[autoload]

CBXPL="*res://Scripts-Autoload/CBXPL.gd"
DHW="*res://Scripts-Autoload/DHW.gd"
NODES="*res://Scripts-Autoload/NODES.gd"

[debug]

force_fps=0

[display]

resizable=false
width=640
height=360
stretch_mode="disabled"
stretch_aspect="ignore"
use_vsync=false

[image_loader]

filter=true
gen_mipmaps=true

[physics]

fixed_fps=60

[physics_2d]

thread_model=1
motion_fix_enabled=true

[rasterizer]

shadow_filter=2

[render]

thread_model=1
